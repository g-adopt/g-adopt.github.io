site_name: G-ADOPT
site_url: https://gadopt.org/
repo_name: g-adopt
repo_url: https://github.com/g-adopt/g-adopt
theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - toc.integrate
plugins:
  - mkdocs-jupyter:
      toc_depth: 2
nav:
  - Home: index.md
  - Install: install.md
  - Documentation: documentation.md
  - Tutorials:
    - tutorials.md
    - Helmholtz: tutorials/01-spd-helmholtz.ipynb
    - Poisson: tutorials/02-poisson.ipynb
    - Elasticity: tutorials/03-elasticity.ipynb
    - "Burgers' Equation": tutorials/04-burgers.ipynb
    - PDE Constrained Optimisation: tutorials/05-pde-constrained-optimisation.ipynb
  - Benchmarks: benchmarks.md
  - Team: team.md
  - Funding: funding.md
  - Events: events.md
  - Publications: publications.md
